<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nisa ❤️ Efe</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:linear-gradient(180deg,#111,#000);
color:#fff;
text-align:center;
min-height:100vh;
}

header{
padding:40px 20px;
}

h1{
font-size:45px;
margin-bottom:10px;
}

p{
opacity:.8;
margin-bottom:20px;
}

button{
padding:15px 30px;
border:none;
border-radius:50px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
background:#ff2f56;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:20px;
padding:30px;
max-width:1300px;
margin:auto;
}

.photo{
overflow:hidden;
border-radius:18px;
background:#222;
box-shadow:0 8px 25px rgba(0,0,0,.4);
animation:fade .7s;
}

.photo img{
width:100%;
height:340px;
object-fit:cover;
transition:.5s;
display:block;
}

.photo:hover img{
transform:scale(1.08);
}

footer{
padding:40px;
opacity:.7;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

@media(max-width:700px){

h1{
font-size:32px;
}

.photo img{
height:260px;
}

}
</style>

</head>

<body>

<header>

<h1>❤️ Nisa & Efe ❤️</h1>

<p>09 Temmuz'dan beri birlikte 💖</p>


</header>

<div id="gallery"></div>

<footer>

Her fotoğraf bizim hikâyemizin bir parçası... ❤️

</footer>

<script>
const gallery = document.getElementById("gallery");

// Kaç fotoğraf varsa burayı değiştir
const totalPhotos = 20;

for (let i = 1; i <= totalPhotos; i++) {

    const box = document.createElement("div");
    box.className = "photo";

    const img = document.createElement("img");

    // Fotoğraflar pages klasöründen okunacak
    img.src = `pages/${i}.jpeg`;

    img.alt = `Fotoğraf ${i}`;

    // Eğer jpeg yoksa jpg dene
    img.onerror = function () {
        img.onerror = function () {
            box.remove();
        };
        img.src = `pages/${i}.jpg`;
    };

    box.appendChild(img);
    gallery.appendChild(box);
}
</script>
</body>
</html>
